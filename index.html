<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TRES ♦">
<title>TRES ♦</title>
<style>
:root {
  --red: #e63946;
  --blue: #2196f3;
  --green: #4caf50;
  --yellow: #ffca28;
  --bg: #0f0f1a;
  --bg2: #1a1a2e;
  --bg3: #16213e;
  --surface: #1e1e35;
  --surface2: #252545;
  --text: #f0f0ff;
  --text2: #a0a0c0;
  --border: rgba(255,255,255,0.08);
  --accent: #7c3aed;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
button { cursor: pointer; border: none; outline: none; font-family: inherit; }
input { font-family: inherit; outline: none; }
.hide { display: none !important; }

/* ===== SCREEN TRANSITIONS ===== */
.screen {
  display: none;
  min-height: 100vh;
  flex-direction: column;
  opacity: 0;
  transform: translateY(12px);
}
.screen.active {
  display: flex;
  animation: screenIn 0.22s cubic-bezier(0.22,1,0.36,1) forwards;
}
.screen.slide-left {
  animation: slideFromRight 0.22s cubic-bezier(0.22,1,0.36,1) forwards;
}
.screen.slide-right {
  animation: slideFromLeft 0.22s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes screenIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideFromRight {
  from { opacity: 0; transform: translateX(24px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slideFromLeft {
  from { opacity: 0; transform: translateX(-24px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ===== DIAMOND PATTERN BG ===== */
.diamond-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.03; background-image: repeating-linear-gradient(45deg, #fff 0, #fff 1px, transparent 0, transparent 50%); background-size: 40px 40px; z-index: 0; }

/* ===== HOME ===== */
#home { align-items: center; justify-content: center; padding: 2rem; position: relative; }
.logo-wrap { text-align: center; margin-bottom: 3rem; }
.logo-title {
  font-size: 5rem; font-weight: 900; letter-spacing: -2px;
  background: linear-gradient(135deg, var(--red), var(--yellow), var(--green), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1;
  animation: logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse {
  0%,100% { filter: brightness(1); }
  50%      { filter: brightness(1.15); }
}
.logo-diamond {
  font-size: 2.5rem; color: var(--red); display: block; margin-top: 0.2rem;
  text-shadow: 0 0 30px rgba(230,57,70,0.5);
  animation: diamondSpin 6s ease-in-out infinite;
}
@keyframes diamondSpin {
  0%,100% { transform: rotate(0deg) scale(1); }
  50%      { transform: rotate(5deg) scale(1.08); }
}
.logo-sub { color: var(--text2); font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 0.5rem; }
.home-btn {
  display: flex; align-items: center; gap: 1rem; width: 100%; max-width: 340px;
  padding: 1.1rem 1.5rem; border-radius: var(--radius); font-size: 1.05rem; font-weight: 600;
  margin: 0.4rem 0; color: var(--text);
  transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s, filter 0.18s;
}
.home-btn:hover { transform: translateY(-2px) scale(1.01); filter: brightness(1.08); }
.home-btn:active { transform: scale(0.96) translateY(0); transition-duration: 0.08s; }
.home-btn .btn-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; transition: transform 0.18s; }
.home-btn:hover .btn-icon { transform: scale(1.15) rotate(-4deg); }
.btn-new { background: linear-gradient(135deg, var(--red), #b71c1c); box-shadow: 0 4px 20px rgba(230,57,70,0.4); }
.btn-new .btn-icon { background: rgba(255,255,255,0.15); }
.btn-cont { background: var(--surface); border: 1px solid var(--border); }
.btn-cont .btn-icon { background: rgba(33,150,243,0.2); color: var(--blue); }
.btn-rules { background: var(--surface); border: 1px solid var(--border); }
.btn-rules .btn-icon { background: rgba(76,175,80,0.2); color: var(--green); }
.btn-hist { background: var(--surface); border: 1px solid var(--border); }
.btn-hist .btn-icon { background: rgba(255,202,40,0.2); color: var(--yellow); }

/* ===== SHARED LAYOUT ===== */
.top-bar { display: flex; align-items: center; gap: 1rem; padding: 1.2rem 1.2rem 1rem; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.back-btn {
  width: 40px; height: 40px; background: var(--surface); border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: var(--text); flex-shrink: 0;
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), background 0.15s;
}
.back-btn:hover { background: var(--surface2); transform: translateX(-2px); }
.back-btn:active { transform: scale(0.9); }
.top-title { font-size: 1.1rem; font-weight: 700; }
.bottom-bar { padding: 1.2rem; background: var(--bg2); border-top: 1px solid var(--border); }
.big-btn {
  width: 100%; padding: 1.1rem; border-radius: var(--radius); font-size: 1.1rem; font-weight: 700;
  background: linear-gradient(135deg, var(--red), #b71c1c); color: #fff;
  box-shadow: 0 4px 20px rgba(230,57,70,0.35);
  transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s, filter 0.18s;
}
.big-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 26px rgba(230,57,70,0.45); filter: brightness(1.07); }
.big-btn:active { transform: scale(0.97); transition-duration: 0.08s; }
.big-btn:disabled { opacity: 0.4; transform: none; }
.section-label { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.8rem; }

/* ===== SETUP ===== */
#setup { padding: 0; }
.setup-body { flex: 1; padding: 1.2rem; overflow-y: auto; }
.add-player-wrap { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
.add-player-wrap input {
  flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 0.85rem 1rem; color: var(--text); font-size: 1rem;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.add-player-wrap input::placeholder { color: var(--text2); }
.add-player-wrap input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(230,57,70,0.12); }
.icon-btn {
  width: 48px; height: 48px; border-radius: 10px; background: var(--red); color: #fff;
  font-size: 1.4rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), filter 0.15s;
}
.icon-btn:hover { transform: scale(1.1) rotate(5deg); filter: brightness(1.1); }
.icon-btn:active { transform: scale(0.9); }
.player-card {
  display: flex; align-items: center; gap: 0.8rem; background: var(--surface);
  border-radius: var(--radius); padding: 0.85rem 1rem; margin-bottom: 0.6rem;
  border: 1px solid var(--border);
  animation: cardSlideIn 0.25s cubic-bezier(0.22,1,0.36,1) both;
  transition: box-shadow 0.2s;
}
.player-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
@keyframes cardSlideIn {
  from { opacity: 0; transform: translateX(-16px) scale(0.97); }
  to   { opacity: 1; transform: translateX(0) scale(1); }
}
.player-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; flex-shrink: 0; }
.player-name { flex: 1; font-weight: 600; font-size: 1rem; }
.player-edit {
  background: var(--surface2); border: none; color: var(--blue); border-radius: 8px;
  padding: 0.4rem 0.7rem; font-size: 0.85rem;
  transition: background 0.15s, transform 0.15s;
}
.player-edit:hover { background: rgba(33,150,243,0.2); transform: scale(1.05); }
.player-del {
  background: rgba(230,57,70,0.15); border: none; color: var(--red); border-radius: 8px;
  padding: 0.4rem 0.7rem; font-size: 1rem;
  transition: background 0.15s, transform 0.15s;
}
.player-del:hover { background: rgba(230,57,70,0.3); transform: scale(1.05); }

/* ===== GAME ===== */
#game { padding: 0; }
.game-header { display: flex; align-items: center; gap: 0.8rem; padding: 1rem 1.2rem; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.game-title { font-size: 1.1rem; font-weight: 700; flex: 1; }
.game-status {
  background: var(--surface); border-radius: 8px; padding: 0.35rem 0.75rem;
  font-size: 0.75rem; color: var(--text2); max-width: 160px; text-align: right;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.game-status strong { color: var(--green); font-weight: 700; }
.header-actions { display: flex; gap: 0.5rem; }
.header-btn {
  width: 38px; height: 38px; background: var(--surface); border-radius: 9px;
  display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 1.1rem;
  transition: background 0.15s, transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
}
.header-btn:hover { background: var(--surface2); transform: scale(1.08); }
.header-btn:active { transform: scale(0.92); }
.ranking { padding: 1rem 1.2rem; flex: 1; overflow-y: auto; }

/* rank cards with transition for reordering */
.rank-card {
  display: flex; align-items: center; gap: 0.8rem; background: var(--surface);
  border-radius: var(--radius); padding: 0.8rem 1rem; margin-bottom: 0.65rem;
  border: 1px solid var(--border);
  transition: border-color 0.3s, background 0.3s, transform 0.2s;
}
.rank-card:hover { transform: translateX(2px); }
.rank-card.rank-1 { border-color: rgba(255,202,40,0.5); background: rgba(255,202,40,0.06); }
.rank-card.rank-1 .rank-pts { color: var(--yellow); }
.rank-pos { font-size: 1.1rem; font-weight: 700; width: 24px; text-align: center; color: var(--text2); }
.rank-pos.pos-1 { color: var(--yellow); font-size: 1.2rem; }
.rank-pos.pos-2 { color: #c0c0c0; }
.rank-pos.pos-3 { color: #cd7f32; }
.rank-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.95rem; flex-shrink: 0; }
.rank-info { flex: 1; min-width: 0; }
.rank-name { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-diff { font-size: 0.72rem; color: var(--text2); margin-top: 0.1rem; }
.rank-diff.leading { color: var(--green); font-weight: 600; }
.rank-pts-wrap { display: flex; flex-direction: column; align-items: flex-end; min-width: 54px; }
.rank-pts {
  font-size: 1.45rem; font-weight: 800; color: var(--text); line-height: 1;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), color 0.2s;
}
.rank-pts.bump { animation: ptsBump 0.35s cubic-bezier(0.34,1.56,0.64,1); }
.rank-pts.bump-down { animation: ptsBumpDown 0.35s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes ptsBump {
  0%   { transform: scale(1); color: var(--text); }
  40%  { transform: scale(1.35); color: var(--green); }
  100% { transform: scale(1); color: var(--text); }
}
@keyframes ptsBumpDown {
  0%   { transform: scale(1); color: var(--text); }
  40%  { transform: scale(0.8); color: var(--red); }
  100% { transform: scale(1); color: var(--text); }
}
.rank-pts-label { font-size: 0.68rem; color: var(--text2); font-weight: 400; margin-top: 0.1rem; }
.pts-btns { display: flex; gap: 0.4rem; flex-shrink: 0; }
.pts-btn {
  width: 36px; height: 36px; border-radius: 9px; font-size: 1.1rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), filter 0.15s;
}
.pts-btn:hover { transform: scale(1.15); filter: brightness(1.2); }
.pts-btn:active { transform: scale(0.88); transition-duration: 0.07s; }
.btn-plus { background: rgba(76,175,80,0.2); color: var(--green); }
.btn-minus { background: rgba(230,57,70,0.2); color: var(--red); }
.game-bottom { padding: 0.8rem 1.2rem; display: flex; gap: 0.6rem; background: var(--bg2); border-top: 1px solid var(--border); }
.game-bottom .big-btn { flex: 1; padding: 0.9rem; font-size: 0.95rem; }
.btn-secondary { background: var(--surface); color: var(--text2); box-shadow: none; border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--surface2); filter: none; box-shadow: none; }

/* ===== POINTS MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.72);
  display: flex; align-items: flex-end; justify-content: center; z-index: 100;
  backdrop-filter: blur(6px);
  animation: overlayIn 0.2s ease both;
}
.modal-overlay.closing { animation: overlayOut 0.18s ease forwards; }
@keyframes overlayIn  { from { opacity: 0 } to { opacity: 1 } }
@keyframes overlayOut { from { opacity: 1 } to { opacity: 0 } }
.modal {
  background: var(--bg2); border-radius: 22px 22px 0 0; padding: 1.5rem;
  width: 100%; max-width: 480px;
  animation: sheetUp 0.24s cubic-bezier(0.22,1,0.36,1) both;
  border-top: 1px solid var(--border);
}
.modal-overlay.closing .modal { animation: sheetDown 0.18s ease forwards; }
@keyframes sheetUp   { from { transform: translateY(100%) } to { transform: translateY(0) } }
@keyframes sheetDown { from { transform: translateY(0) }    to { transform: translateY(100%) } }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: -0.5rem auto 1.2rem; }
.modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
.modal-player { font-size: 0.85rem; color: var(--text2); margin-bottom: 1.2rem; }
.quick-pts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
.quick-btn {
  padding: 0.75rem 0; border-radius: 10px; font-size: 0.9rem; font-weight: 700;
  transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), filter 0.15s;
}
.quick-btn:hover { transform: scale(1.06) translateY(-1px); filter: brightness(1.15); }
.quick-btn:active { transform: scale(0.93); transition-duration: 0.07s; }
.qb-plus  { background: rgba(76,175,80,0.2);  color: var(--green); border: 1px solid rgba(76,175,80,0.3); }
.qb-minus { background: rgba(230,57,70,0.2);  color: var(--red);   border: 1px solid rgba(230,57,70,0.3); }
.custom-input-wrap { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
.custom-input-wrap input {
  flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 0.8rem 1rem; color: var(--text); font-size: 1rem;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.custom-input-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
.modal-actions { display: flex; gap: 0.5rem; }
.modal-actions button {
  flex: 1; padding: 0.9rem; border-radius: 10px; font-weight: 700; font-size: 0.95rem;
  transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), filter 0.15s;
}
.modal-actions button:hover { transform: translateY(-1px); filter: brightness(1.1); }
.modal-actions button:active { transform: scale(0.96); }
.btn-cancel { background: var(--surface); color: var(--text2); }
.btn-add { background: rgba(76,175,80,0.25); color: var(--green); border: 1px solid rgba(76,175,80,0.4); }
.btn-sub { background: rgba(230,57,70,0.25); color: var(--red);   border: 1px solid rgba(230,57,70,0.4); }

/* ===== HISTORY ===== */
#history { padding: 0; }
.hist-list { flex: 1; overflow-y: auto; padding: 0.5rem 1.2rem; }
.hist-item {
  display: flex; align-items: center; gap: 0.8rem;
  padding: 0.75rem 0.6rem; border-bottom: 1px solid var(--border);
  border-radius: 8px;
  animation: histIn 0.2s cubic-bezier(0.22,1,0.36,1) both;
  transition: background 0.15s;
}
.hist-item:hover { background: var(--surface); }
@keyframes histIn {
  from { opacity: 0; transform: translateX(12px); }
  to   { opacity: 1; transform: translateX(0); }
}
.hist-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
.hist-body { flex: 1; }
.hist-name { font-size: 0.9rem; font-weight: 600; }
.hist-time { font-size: 0.75rem; color: var(--text2); margin-top: 0.05rem; }
.hist-change { font-weight: 800; font-size: 1.05rem; text-align: right; }
.hist-change.plus  { color: var(--green); }
.hist-change.minus { color: var(--red); }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text2); }
.empty-icon { font-size: 3rem; margin-bottom: 1rem; }

/* ===== PAST GAMES ===== */
#pastgames { padding: 0; }
.past-list { flex: 1; overflow-y: auto; padding: 1rem 1.2rem; }
.past-card {
  background: var(--surface); border-radius: var(--radius); padding: 1rem 1.2rem;
  margin-bottom: 0.8rem; border: 1px solid var(--border);
  transition: transform 0.15s, box-shadow 0.15s;
}
.past-card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
.past-date { font-size: 0.75rem; color: var(--text2); margin-bottom: 0.5rem; }
.past-winner { font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; }
.past-players { font-size: 0.82rem; color: var(--text2); }

/* ===== STATS ===== */
#stats { padding: 0; }
.stats-body { flex: 1; overflow-y: auto; padding: 1rem 1.2rem; }
.stat-row {
  display: flex; align-items: center; gap: 0.8rem; background: var(--surface);
  border-radius: var(--radius); padding: 0.9rem 1rem; margin-bottom: 0.6rem; border: 1px solid var(--border);
  transition: transform 0.15s, box-shadow 0.15s;
}
.stat-row:hover { transform: translateX(3px); }
.stat-rank { font-size: 1.5rem; font-weight: 900; min-width: 2.5rem; color: var(--text2); }
.stat-name { flex: 1; font-weight: 600; }
.stat-wins { font-size: 1.3rem; font-weight: 800; }
.stat-wins span { font-size: 0.75rem; color: var(--text2); font-weight: 400; }
.stats-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 1.2rem; }
.stat-meta-card { background: var(--surface); border-radius: var(--radius); padding: 1rem; text-align: center; border: 1px solid var(--border); }
.stat-meta-num { font-size: 2rem; font-weight: 800; }
.stat-meta-label { font-size: 0.75rem; color: var(--text2); margin-top: 0.2rem; }

/* ===== RULES ===== */
#rules { padding: 0; }
.rules-body { flex: 1; overflow-y: auto; padding: 1rem 1.2rem; padding-bottom: 2rem; }
.rules-tabs { display: flex; gap: 0.4rem; padding: 0.8rem 1.2rem; background: var(--bg2); border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; }
.rules-tabs::-webkit-scrollbar { display: none; }
.rtab {
  padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.82rem; font-weight: 600;
  white-space: nowrap; color: var(--text2); background: var(--surface); border: 1px solid var(--border);
  transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
}
.rtab:hover { transform: translateY(-1px); filter: brightness(1.1); }
.rtab.active { background: var(--red); color: #fff; border-color: transparent; transform: translateY(-1px); }
.rule-card { background: var(--surface); border-radius: var(--radius); padding: 1rem 1.2rem; margin-bottom: 0.8rem; border: 1px solid var(--border); }
.rule-card-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 0.6rem; }
.rule-item { display: flex; align-items: flex-start; gap: 0.7rem; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; line-height: 1.5; }
.rule-item:last-child { border-bottom: none; padding-bottom: 0; }
.rule-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 0.05rem; }
.special-card { border-radius: var(--radius); padding: 0.9rem 1rem; margin-bottom: 0.6rem; display: flex; align-items: flex-start; gap: 0.8rem; transition: transform 0.15s; }
.special-card:hover { transform: translateX(3px); }
.special-card.red    { background: rgba(230,57,70,0.1);  border: 1px solid rgba(230,57,70,0.25); }
.special-card.blue   { background: rgba(33,150,243,0.1); border: 1px solid rgba(33,150,243,0.25); }
.special-card.green  { background: rgba(76,175,80,0.1);  border: 1px solid rgba(76,175,80,0.25); }
.special-card.yellow { background: rgba(255,202,40,0.1); border: 1px solid rgba(255,202,40,0.25); }
.special-card.purple { background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.25); }
.special-badge { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
.special-badge.red    { background: rgba(230,57,70,0.25);  color: var(--red); }
.special-badge.blue   { background: rgba(33,150,243,0.25); color: var(--blue); }
.special-badge.green  { background: rgba(76,175,80,0.25);  color: var(--green); }
.special-badge.yellow { background: rgba(255,202,40,0.25); color: var(--yellow); }
.special-badge.purple { background: rgba(124,58,237,0.25); color: #a78bfa; }
.special-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.25rem; }
.special-desc  { font-size: 0.85rem; color: var(--text2); line-height: 1.5; }
.dist-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
.dist-table th { text-align: left; color: var(--text2); font-weight: 600; padding: 0.5rem; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1px; }
.dist-table td { padding: 0.6rem 0.5rem; border-bottom: 1px solid var(--border); }
.dist-table tr:last-child td { border-bottom: none; }
.badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 6px; font-size: 0.78rem; font-weight: 700; }
.badge-red    { background: rgba(230,57,70,0.2);  color: var(--red); }
.badge-blue   { background: rgba(33,150,243,0.2); color: var(--blue); }
.badge-green  { background: rgba(76,175,80,0.2);  color: var(--green); }
.badge-yellow { background: rgba(255,202,40,0.2); color: var(--yellow); }
.badge-purple { background: rgba(124,58,237,0.2); color: #a78bfa; }

/* ===== END GAME MODAL ===== */
.modal-winner { text-align: center; padding: 1rem 0; }
.trophy { font-size: 4rem; margin-bottom: 0.5rem; animation: trophyBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes trophyBounce {
  from { transform: scale(0) rotate(-20deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg);   opacity: 1; }
}
.winner-name { font-size: 1.5rem; font-weight: 800; }
.winner-sub  { color: var(--text2); margin-bottom: 1.5rem; }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 1.5rem; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2); color: var(--text);
  padding: 0.65rem 1.3rem; border-radius: 24px; font-size: 0.88rem; font-weight: 600;
  z-index: 200; border: 1px solid var(--border); white-space: nowrap;
  transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
  opacity: 0;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.hiding { transform: translateX(-50%) translateY(80px); opacity: 0; transition-timing-function: ease-in; transition-duration: 0.18s; }

/* ===== AVATAR COLORS ===== */
.color-0 { background: rgba(230,57,70,0.25);  color: var(--red); }
.color-1 { background: rgba(33,150,243,0.25); color: var(--blue); }
.color-2 { background: rgba(76,175,80,0.25);  color: var(--green); }
.color-3 { background: rgba(255,202,40,0.25); color: #a08000; }
.color-4 { background: rgba(124,58,237,0.25); color: #a78bfa; }
.color-5 { background: rgba(0,188,212,0.25);  color: #00bcd4; }
.color-6 { background: rgba(255,87,34,0.25);  color: #ff5722; }
.color-7 { background: rgba(233,30,99,0.25);  color: #e91e63; }
.color-text-0 { color: var(--red); }
.color-text-1 { color: var(--blue); }
.color-text-2 { color: var(--green); }
.color-text-3 { color: var(--yellow); }
.color-text-4 { color: #a78bfa; }
.color-text-5 { color: #00bcd4; }
.color-text-6 { color: #ff5722; }
.color-text-7 { color: #e91e63; }

/* ===== LEADER CROWN GLOW ===== */
.rank-card.rank-1 .rank-avatar {
  box-shadow: 0 0 0 2px rgba(255,202,40,0.5), 0 0 14px rgba(255,202,40,0.25);
}
</style>
</head>
<body>
<div class="diamond-bg"></div>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="logo-wrap">
    <div class="logo-title">TRES</div>
    <div class="logo-diamond">♦</div>
    <div class="logo-sub">El juego de cartas</div>
  </div>
  <button class="home-btn btn-new" onclick="goTo('setup','right'); resetSetup()">
    <div class="btn-icon">♦</div>
    <span>Nueva partida</span>
  </button>
  <button class="home-btn btn-cont" id="btn-continue" onclick="continueGame()">
    <div class="btn-icon">▶</div>
    <span>Continuar partida</span>
  </button>
  <button class="home-btn btn-rules" onclick="goTo('rules','right')">
    <div class="btn-icon">📖</div>
    <span>Reglas</span>
  </button>
  <button class="home-btn btn-hist" onclick="goTo('pastgames','right')">
    <div class="btn-icon">🏆</div>
    <span>Historial</span>
  </button>
</div>

<!-- SETUP -->
<div id="setup" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goTo('home','left')">←</button>
    <span class="top-title">Nueva partida</span>
  </div>
  <div class="setup-body">
    <p class="section-label">Agregar jugador</p>
    <div class="add-player-wrap">
      <input type="text" id="player-input" placeholder="Nombre del jugador..." maxlength="20" onkeydown="if(event.key==='Enter')addPlayer()">
      <button class="icon-btn" onclick="addPlayer()">+</button>
    </div>
    <p class="section-label" id="players-label">Jugadores (0)</p>
    <div id="players-list"></div>
  </div>
  <div class="bottom-bar">
    <button class="big-btn" id="start-btn" onclick="startGame()" disabled>Comenzar partida ♦</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="game-header">
    <button class="back-btn" onclick="confirmEnd()" style="background:transparent;font-size:1.5rem;">←</button>
    <span class="game-title">TRES ♦</span>
    <span class="game-status" id="game-status"><strong>●</strong> Partida activa</span>
    <div class="header-actions">
      <button class="header-btn" onclick="undoLast()" title="Deshacer">↩</button>
      <button class="header-btn" onclick="goTo('history','right')" title="Historial">📋</button>
    </div>
  </div>
  <div class="ranking" id="ranking"></div>
  <div class="game-bottom">
    <button class="big-btn btn-secondary" onclick="goTo('rules','right')">Reglas</button>
    <button class="big-btn" onclick="showEndModal()">Terminar partida</button>
  </div>
</div>

<!-- HISTORY -->
<div id="history" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goTo('game','left')">←</button>
    <span class="top-title">Historial</span>
    <button class="header-btn" onclick="undoLast(); goTo('game','left')" style="margin-left:auto;padding:0 0.6rem;width:auto;font-size:0.82rem;font-weight:700;gap:0.3rem">↩ Deshacer</button>
  </div>
  <div class="hist-list" id="hist-list"></div>
</div>

<!-- PAST GAMES -->
<div id="pastgames" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goTo('home','left')">←</button>
    <span class="top-title">Historial de partidas</span>
    <button class="header-btn" onclick="goTo('stats','right')" style="margin-left:auto">📊</button>
  </div>
  <div class="past-list" id="past-list"></div>
</div>

<!-- STATS -->
<div id="stats" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goTo('pastgames','left')">←</button>
    <span class="top-title">Estadísticas</span>
  </div>
  <div class="stats-body" id="stats-body"></div>
</div>

<!-- RULES -->
<div id="rules" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="rulesBack()">←</button>
    <span class="top-title">Reglas TRES ♦</span>
  </div>
  <div class="rules-tabs" id="rules-tabs"></div>
  <div class="rules-body" id="rules-body"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let state = {
  players: [],
  moves: [],
  startedAt: null,
  started: false
};
let pendingPlayerId = null;

const COLORS = 8;
const playerColor     = (i) => `color-${i % COLORS}`;
const playerColorText = (i) => `color-text-${i % COLORS}`;
const initials        = (name) => name.slice(0, 2).toUpperCase();

// ===== LOCAL STORAGE =====
function save() {
  localStorage.setItem('tres_state', JSON.stringify(state));
}
function load() {
  const d = localStorage.getItem('tres_state');
  if (d) {
    state = JSON.parse(d);
    if (state.players) state.players.forEach(p => { p.id = String(p.id); });
    if (state.moves)   state.moves.forEach(m => { m.playerId = String(m.playerId); });
  }
}
function savePastGames(game) {
  const games = JSON.parse(localStorage.getItem('tres_past') || '[]');
  games.unshift(game);
  localStorage.setItem('tres_past', JSON.stringify(games));
}
function getPastGames() {
  return JSON.parse(localStorage.getItem('tres_past') || '[]');
}

// ===== NAVIGATION =====
function goTo(screen, dir) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active', 'slide-left', 'slide-right');
    s.style.display = 'none';
  });
  const el = document.getElementById(screen);
  el.style.display = 'flex';
  // force reflow so animation fires fresh
  void el.offsetWidth;
  el.classList.add('active');
  if (dir === 'right') el.classList.add('slide-left');
  if (dir === 'left')  el.classList.add('slide-right');

  if (screen === 'game')      renderGame();
  if (screen === 'history')   renderHistory();
  if (screen === 'pastgames') renderPastGames();
  if (screen === 'stats')     renderStats();
  if (screen === 'rules')     renderRules();
  if (screen === 'home')      checkContinue();
}

function rulesBack() {
  if (state.started) goTo('game', 'left');
  else goTo('home', 'left');
}

function checkContinue() {
  const btn = document.getElementById('btn-continue');
  btn.style.opacity = state.started ? '1' : '0.45';
  btn.style.pointerEvents = state.started ? 'auto' : 'none';
}

// ===== SETUP =====
let setupPlayers = [];

function resetSetup() {
  setupPlayers = [];
  document.getElementById('player-input').value = '';
  renderSetupList();
}

function addPlayer() {
  const input = document.getElementById('player-input');
  const name = input.value.trim();
  if (!name) return;
  setupPlayers.push({ name, id: String(Date.now()) + String(Math.floor(Math.random() * 10000)) });
  input.value = '';
  input.focus();
  renderSetupList();
}

function renderSetupList() {
  const list  = document.getElementById('players-list');
  const label = document.getElementById('players-label');
  const btn   = document.getElementById('start-btn');
  label.textContent = `Jugadores (${setupPlayers.length})`;
  btn.disabled = setupPlayers.length < 2;
  list.innerHTML = setupPlayers.map((p, i) => `
    <div class="player-card" style="animation-delay:${i * 0.04}s">
      <div class="player-avatar ${playerColor(i)}">${initials(p.name)}</div>
      <span class="player-name">${p.name}</span>
      <button class="player-edit" onclick="renamePlayer(${i})">✏️</button>
      <button class="player-del"  onclick="removePlayer(${i})">✕</button>
    </div>
  `).join('');
}

function renamePlayer(i) {
  const name = prompt('Nuevo nombre:', setupPlayers[i].name);
  if (name && name.trim()) { setupPlayers[i].name = name.trim(); renderSetupList(); }
}
function removePlayer(i) { setupPlayers.splice(i, 1); renderSetupList(); }

function startGame() {
  state = {
    players: setupPlayers.map((p, i) => ({ name: p.name, id: String(p.id), points: 0, colorIdx: i })),
    moves: [],
    startedAt: Date.now(),
    started: true
  };
  save();
  goTo('game', 'right');
}

function continueGame() {
  if (!state.started) return;
  goTo('game', 'right');
}

// ===== GAME STATUS LABEL =====
function gameStatusText() {
  const n = state.players.length;
  const label = `${n} jugador${n !== 1 ? 'es' : ''}`;
  if (!state.startedAt) return label;
  const now = new Date();
  const then = new Date(state.startedAt);
  const sameDay = now.toDateString() === then.toDateString();
  const timeStr = then.toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
  return `${label} · ${sameDay ? 'hoy ' + timeStr : then.toLocaleDateString('es')}`;
}

// ===== GAME RENDER =====
// Track previous order so we can animate point changes
let prevOrder = [];

function renderGame() {
  const sorted = [...state.players].sort((a, b) => b.points - a.points);
  const leader = sorted[0];
  const rankDiv = document.getElementById('ranking');

  // Update status pill
  document.getElementById('game-status').innerHTML = `<strong>●</strong> ${gameStatusText()}`;

  rankDiv.innerHTML = sorted.map((p, idx) => {
    const origIdx   = state.players.findIndex(x => x.id === p.id);
    const posClass  = idx === 0 ? 'pos-1' : idx === 1 ? 'pos-2' : idx === 2 ? 'pos-3' : '';
    const cardClass = idx === 0 ? 'rank-1' : '';
    const posLabel  = idx === 0 ? '♦' : `${idx + 1}°`;
    const diff      = leader.points - p.points;
    const diffText  = idx === 0
      ? '<span class="rank-diff leading">Líder ♦</span>'
      : diff > 0
        ? `<span class="rank-diff">−${diff} del líder</span>`
        : '<span class="rank-diff">Empatado</span>';

    // Check if this card needs a bump animation
    const prev = prevOrder.find(x => x.id === p.id);
    const bumpClass = prev
      ? (p.points > prev.points ? 'bump' : p.points < prev.points ? 'bump-down' : '')
      : '';

    return `
      <div class="rank-card ${cardClass}" id="rc-${p.id}">
        <div class="rank-pos ${posClass}">${posLabel}</div>
        <div class="rank-avatar ${playerColor(origIdx)}">${initials(p.name)}</div>
        <div class="rank-info">
          <div class="rank-name">${p.name}</div>
          ${diffText}
        </div>
        <div class="rank-pts-wrap">
          <div class="rank-pts ${bumpClass}" id="rp-${p.id}">${p.points}</div>
          <div class="rank-pts-label">pts</div>
        </div>
        <div class="pts-btns">
          <button class="pts-btn btn-plus"  onclick="openModal('${p.id}','plus')">+</button>
          <button class="pts-btn btn-minus" onclick="openModal('${p.id}','minus')">−</button>
        </div>
      </div>
    `;
  }).join('');

  // Save current order for next diff
  prevOrder = sorted.map(p => ({ id: p.id, points: p.points }));
}

// ===== HISTORY RENDER =====
function renderHistory() {
  const list = document.getElementById('hist-list');
  if (state.moves.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>Sin movimientos aún</p></div>`;
    return;
  }
  list.innerHTML = [...state.moves].reverse().map((m, idx) => {
    const p       = state.players.find(x => x.id === m.playerId);
    const origIdx = state.players.findIndex(x => x.id === m.playerId);
    const sign    = m.amount > 0 ? '+' : '';
    const cls     = m.amount > 0 ? 'plus' : 'minus';
    const d       = new Date(m.ts);
    const timeStr = d.toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
    const name    = p ? p.name : '?';
    return `
      <div class="hist-item" style="animation-delay:${idx * 0.03}s">
        <div class="hist-avatar ${playerColor(origIdx)}">${initials(name)}</div>
        <div class="hist-body">
          <div class="hist-name">${name}</div>
          <div class="hist-time">${timeStr}</div>
        </div>
        <div class="hist-change ${cls}">${sign}${m.amount}</div>
      </div>
    `;
  }).join('');
}

// ===== POINTS MODAL =====
function openModal(playerId, type) {
  const pid = String(playerId);
  const p   = state.players.find(x => String(x.id) === pid);
  if (!p) { showToast('Error: jugador no encontrado'); return; }
  pendingPlayerId = pid;
  const isPlus = type === 'plus';
  const html = `
    <div class="modal-overlay" id="modal-overlay" onclick="closeModalIfOutside(event)">
      <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-title">${isPlus ? '+ Sumar' : '− Restar'} puntos</div>
        <div class="modal-player">Jugador: <strong>${p.name}</strong> · ${p.points} pts</div>
        <p class="section-label">Valores rápidos</p>
        <div class="quick-pts">
          ${[10,50,100,200].map(v =>
            `<button class="quick-btn ${isPlus ? 'qb-plus' : 'qb-minus'}"
              onclick="applyPoints('${pid}',${isPlus ? v : -v})">
              ${isPlus ? '+' : '-'}${v}
            </button>`
          ).join('')}
        </div>
        <p class="section-label">Personalizado</p>
        <div class="custom-input-wrap">
          <input type="number" id="custom-pts" placeholder="Cantidad..." min="1">
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
          ${isPlus
            ? `<button class="btn-add" onclick="applyCustom('${pid}',1)">+ Sumar</button>`
            : `<button class="btn-sub" onclick="applyCustom('${pid}',-1)">− Restar</button>`}
        </div>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);
  setTimeout(() => {
    const inp = document.getElementById('custom-pts');
    if (inp) inp.focus();
  }, 260);
}

function closeModalIfOutside(e) {
  if (e.target === e.currentTarget) closeModal();
}

function closeModal() {
  const m = document.getElementById('modal-overlay');
  if (m) { m.classList.add('closing'); setTimeout(() => m.remove(), 200); }
}

function applyPoints(playerId, amount) {
  const pid = String(playerId);
  const p   = state.players.find(x => String(x.id) === pid);
  if (!p) { showToast('Error: jugador no encontrado'); return; }
  p.points += amount;
  state.moves.push({ playerId: pid, amount, pts: p.points, ts: Date.now() });
  save();
  closeModal();
  renderGame();
  showToast(`${p.name} ${amount > 0 ? '+' : ''}${amount} pts`);
}

function applyCustom(playerId, sign) {
  const val = parseInt(document.getElementById('custom-pts').value);
  if (!val || val <= 0) { showToast('Ingresá un valor válido'); return; }
  applyPoints(String(playerId), sign * val);
}

function undoLast() {
  if (state.moves.length === 0) { showToast('Sin movimientos para deshacer'); return; }
  const last = state.moves.pop();
  const p    = state.players.find(x => String(x.id) === String(last.playerId));
  if (p) { p.points -= last.amount; }
  save();
  renderGame();
  showToast('Movimiento deshecho');
}

// ===== END GAME =====
function showEndModal() {
  const sorted = [...state.players].sort((a, b) => b.points - a.points);
  const winner = sorted[0];
  const html = `
    <div class="modal-overlay" id="modal-overlay" onclick="closeModalIfOutside(event)">
      <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-winner">
          <div class="trophy">🏆</div>
          <div class="winner-name">${winner.name}</div>
          <div class="winner-sub">¡Ganó la partida!</div>
          <p style="color:var(--text2);font-size:0.85rem;margin-bottom:1.5rem">Puntos: ${winner.points}</p>
        </div>
        <div style="display:flex;flex-direction:column;gap:0.6rem">
          <button class="big-btn" onclick="endGame()">Guardar y terminar</button>
          <button class="btn-cancel" style="padding:0.85rem;border-radius:10px;font-weight:600;width:100%;background:var(--surface);color:var(--text2)" onclick="closeModal()">Seguir jugando</button>
        </div>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);
}

function endGame() {
  const sorted = [...state.players].sort((a, b) => b.points - a.points);
  savePastGames({
    date: new Date().toLocaleDateString('es'),
    players: state.players.map(p => ({ name: p.name, points: p.points })),
    winner: sorted[0].name
  });
  updateStats(sorted[0].name, state.players.map(p => p.name));
  state.started  = false;
  state.moves    = [];
  save();
  closeModal();
  goTo('home', 'left');
  showToast('¡Partida guardada!');
}

function confirmEnd() {
  if (confirm('¿Salir de la partida? Se guardará el progreso.')) {
    save();
    goTo('home', 'left');
  }
}

// ===== STATS =====
function updateStats(winner, players) {
  const stats = JSON.parse(localStorage.getItem('tres_stats') || '{}');
  players.forEach(name => {
    if (!stats[name]) stats[name] = { played: 0, wins: 0 };
    stats[name].played++;
  });
  if (!stats[winner]) stats[winner] = { played: 0, wins: 0 };
  stats[winner].wins++;
  localStorage.setItem('tres_stats', JSON.stringify(stats));
}

function renderStats() {
  const stats   = JSON.parse(localStorage.getItem('tres_stats') || '{}');
  const body    = document.getElementById('stats-body');
  const entries = Object.entries(stats).sort((a, b) => b[1].wins - a[1].wins);
  const medals  = ['🥇', '🥈', '🥉'];
  const ranking = entries.map(([name, data], i) => `
    <div class="stat-row">
      <div class="stat-rank">${medals[i] || (i + 1)}</div>
      <div class="stat-name">${name}</div>
      <div class="stat-wins">${data.wins} <span>victorias · ${data.played} partidas</span></div>
    </div>
  `).join('');
  body.innerHTML = `
    <div class="stats-meta">
      <div class="stat-meta-card">
        <div class="stat-meta-num">${getPastGames().length}</div>
        <div class="stat-meta-label">Partidas jugadas</div>
      </div>
      <div class="stat-meta-card">
        <div class="stat-meta-num">${entries.length}</div>
        <div class="stat-meta-label">Jugadores distintos</div>
      </div>
    </div>
    <p class="section-label">Ranking histórico</p>

}

function renderPastGames() {
  const games = getPastGames();
  const list  = document.getElementById('past-list');
  if (games.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🎮</div><p>No hay partidas guardadas</p></div>`;
    return;
  }
  list.innerHTML = games.map(g => `
    <div class="past-card">
      <div class="past-date">📅 ${g.date}</div>
      <div class="past-winner">🏆 ${g.winner}</div>
      <div class="past-players">${g.players.map(p => `${p.name}: ${p.points} pts`).join(' · ')}</div>
    </div>
  `).join('');
}

let activeTab = 0;

function renderRules() {
  const tabsEl = document.getElementById('rules-tabs');
  const bodyEl = document.getElementById('rules-body');
  tabsEl.innerHTML = rulesData.map((r, i) => `
    <button class="rtab ${i === activeTab ? 'active' : ''}" onclick="setRulesTab(${i})">${r.tab}</button>
  `).join('');
  bodyEl.innerHTML = rulesData[activeTab].content();
}

function setRulesTab(i) {
  activeTab = i;
  renderRules();
}

// ===== TOAST =====
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hiding');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    t.classList.add('hiding');
    setTimeout(() => { t.classList.remove('show', 'hiding'); }, 200);
  }, 2000);
}
